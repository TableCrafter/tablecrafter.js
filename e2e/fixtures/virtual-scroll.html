<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TableCrafter Virtual Scroll Fixture</title>
  <link rel="stylesheet" href="/dist/v3/styles.css">
  <script src="/dist/v3/tablecrafter.global.js"></script>
  <style>
    body { margin: 0; }
    #tc-mount { width: 800px; }
    /* Force card mode so the virtual scroll container is a <div> (overflow-y works on divs) */
    .tc-cards-container {
      height: 400px !important;
      overflow-y: auto !important;
    }
  </style>
</head>
<body>
  <div id="tc-mount"></div>
  <script>
    (function () {
      var data = [];
      for (var i = 1; i <= 5000; i++) {
        data.push({
          id: i,
          name: 'Row ' + i,
          value: Math.round(i * 1.5),
          category: 'cat-' + ((i % 10) + 1)
        });
      }

      window.tablecrafter = new TableCrafter('#tc-mount', {
        data: data,
        columns: [
          { key: 'id', label: 'ID', sortable: true },
          { key: 'name', label: 'Name', sortable: true },
          { key: 'value', label: 'Value', type: 'number', sortable: true },
          { key: 'category', label: 'Category', sortable: true }
        ],
        virtual: true,
        pageSize: 0,
        // Force card mode so the scroll container is a <div> (proper overflow support)
        view: 'card'
      });
      window.tablecrafter.render();

      // Expose scrollToRow: rowHeight=40 as configured in virtual.ts default
      window.scrollToRow = function (rowIndex) {
        var container = document.querySelector('.tc-cards-container');
        if (container) {
          container.scrollTo({ top: rowIndex * 40, behavior: 'instant' });
          container.dispatchEvent(new Event('scroll'));
        }
      };
    })();
  </script>
</body>
</html>
